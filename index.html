<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Colorama — Clasificador Gate 0</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1e2240;font-family:Georgia,'Times New Roman',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .wrap{width:100%;max-width:540px;}
  .header{margin-bottom:20px;}
  .tag-left{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .dot{width:24px;height:24px;background:#e85d04;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:bold;font-family:monospace;}
  .tag-txt{color:#c0c8dc;font-size:10px;letter-spacing:2px;font-family:monospace;text-transform:uppercase;}
  h1{color:#ffffff;font-size:24px;font-weight:normal;line-height:1.3;}
  h1 span{color:#e85d04;font-style:italic;}
  .card{background:#2a2f50;border:1px solid #4a5070;padding:28px;}
  .login-title{color:#ffffff;font-size:18px;margin-bottom:6px;}
  .login-sub{color:#a0aac0;font-size:12px;font-family:monospace;margin-bottom:24px;letter-spacing:1px;}
  .field{margin-bottom:14px;}
  .field label{display:block;color:#a0aac0;font-size:10px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .text-inp{background:#1e2240;border:1px solid #4a5070;color:#fff;padding:13px 15px;font-size:14px;font-family:Georgia,serif;width:100%;outline:none;}
  .text-inp::placeholder{color:#6a7090;}
  .text-inp:focus{border-color:#e85d04;}
  .primary-btn{background:#e85d04;border:none;color:#fff;padding:14px;cursor:pointer;font-size:11px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;width:100%;margin-top:6px;}
  .primary-btn:disabled{background:#4a5070;color:#8090b0;cursor:default;}
  .msg{padding:10px 14px;margin-bottom:14px;font-size:11px;font-family:monospace;}
  .msg.err{background:#3a1a1a;border:1px solid #6a2a2a;color:#f87171;}
  .msg.ok{background:#1a3a2a;border:1px solid #2a6a4a;color:#4ade80;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .user-info{color:#a0aac0;font-size:10px;font-family:monospace;letter-spacing:1px;}
  .user-info strong{color:#e85d04;}
  .logout-btn{background:transparent;border:1px solid #4a5070;color:#a0aac0;padding:5px 10px;cursor:pointer;font-size:9px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;}
  .logout-btn:hover{border-color:#e85d04;color:#fff;}
  .prog{margin-bottom:24px;}
  .prog-top{display:flex;justify-content:space-between;margin-bottom:6px;}
  .prog-lbl{color:#a0aac0;font-size:10px;font-family:monospace;letter-spacing:1px;}
  .track{height:3px;background:#4a5070;border-radius:2px;}
  .fill{height:100%;background:#e85d04;transition:width 0.4s;border-radius:2px;}
  .question{color:#ffffff;font-size:16px;margin-bottom:6px;line-height:1.5;font-weight:normal;}
  .question-hint{color:#8090b0;font-size:11px;font-family:monospace;margin-bottom:16px;letter-spacing:0.5px;}
  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt-btn{background:#1e2240;border:1px solid #4a5070;color:#d0d8ec;padding:12px 15px;text-align:left;cursor:pointer;font-size:13px;font-family:Georgia,serif;display:flex;align-items:center;gap:12px;transition:all 0.15s;width:100%;}
  .opt-btn:hover{border-color:#e85d04;color:#fff;background:rgba(232,93,4,0.10);}
  .opt-btn.sel{background:rgba(232,93,4,0.15);border-color:#e85d04;color:#fff;}
  .sq{width:14px;height:14px;border:1px solid #6a7090;flex-shrink:0;}
  .sq.sel{border-color:#e85d04;background:#e85d04;}
  .dot-sq{width:6px;height:6px;background:#e85d04;flex-shrink:0;}
  .multi-hint{color:#a0aac0;font-size:10px;margin-bottom:10px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;}
  .badge{display:inline-flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:6px;width:100%;}
  .badge-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;flex-shrink:0;color:#fff;}
  .badge-txt{font-weight:bold;font-size:15px;font-family:monospace;}
  .badge-sub{font-size:10px;font-family:monospace;opacity:0.8;margin-top:2px;}
  .res-rows{display:flex;flex-direction:column;gap:11px;margin:18px 0;border-top:1px solid #4a5070;padding-top:18px;}
  .res-row{display:flex;gap:14px;}
  .res-key{color:#a0aac0;font-size:10px;font-family:monospace;min-width:68px;padding-top:2px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
  .res-val{color:#d0d8ec;font-size:13px;line-height:1.5;}
  .res-val.bold{color:#ffffff;font-weight:bold;}
  .inputs-box{background:#1e2240;border:1px solid #3a4060;padding:14px;margin-bottom:18px;}
  .inputs-lbl{color:#7a84a4;font-size:9px;font-family:monospace;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;}
  .inp-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #3a4060;font-size:11px;font-family:monospace;gap:12px;}
  .inp-row:last-child{border-bottom:none;}
  .inp-k{color:#a0aac0;text-transform:uppercase;flex-shrink:0;}
  .inp-v{color:#d0d8ec;text-align:right;}
  .btns{display:flex;gap:10px;}
  .save-btn{flex:2;background:#e85d04;border:none;color:#fff;padding:13px;cursor:pointer;font-size:11px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;}
  .save-btn:disabled{background:#4a5070;color:#8090b0;cursor:default;}
  .new-btn{flex:1;background:transparent;border:1px solid #4a5070;color:#c0c8dc;padding:13px;cursor:pointer;font-size:11px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;}
  .new-btn:hover{border-color:#8090b0;color:#fff;}
  .footer{margin-top:12px;display:flex;justify-content:space-between;}
  .footer span{color:#4a5070;font-size:9px;font-family:monospace;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="tag-left">
      <div class="dot">C</div>
      <span class="tag-txt">Colorama · Gate 0 · Clasificador</span>
    </div>
    <h1>Evaluación de <span>Complejidad</span></h1>
  </div>

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <p class="login-title">Acceso al sistema</p>
    <p class="login-sub">INGRESA TUS CREDENCIALES PARA CONTINUAR</p>
    <div id="loginMsg"></div>
    <div class="field">
      <label>Usuario</label>
      <input class="text-inp" id="inputUsuario" placeholder="tu.usuario" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input class="text-inp" type="password" id="inputClave" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="primary-btn" id="loginBtn" onclick="doLogin()">Ingresar →</button>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <div class="topbar">
      <span class="user-info">Sesión: <strong id="nombreUsuario"></strong></span>
      <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
    </div>
    <div class="card" id="card"></div>
  </div>

  <div class="footer">
    <span>GATE 0 · v4.0 · 4 Niveles</span>
    <span>COLORAMA · 2026</span>
  </div>
</div>

<script>
const GS_URL="https://script.google.com/macros/s/AKfycbyoYMvBHwuBZm1bjObR91cWov6iR1O6RKmdpieoaDuUDqDTUn0uXPDX8I8GyyDFjhLA/exec";

const STEPS=[
  {
    id:"cliente",tipo:"text",
    pregunta:"Nombre del cliente / proyecto",
    hint:"",
    placeholder:"Ej: Viña del Valle — Carmenere 2026"
  },
  {
    id:"tecnologia",tipo:"single",
    pregunta:"¿Cuál es la tecnología de impresión?",
    hint:"",
    opts:["Flexografía","Digital","Offset","HP Índigo"]
  },
  {
    id:"pantones",tipo:"single",
    pregunta:"¿Qué colores especiales incluye?",
    hint:"Además de la cuatricromía (CMYK) base",
    opts:["Solo CMYK — sin colores especiales","1-2 Pantones","3 o más Pantones / colores especiales"]
  },
  {
    id:"folia",tipo:"single",
    pregunta:"¿Se aplica folia?",
    hint:"Incluye foil, hot stamping, cold stamping",
    opts:["Sin folia","Folia simple — líneas o marco","Folia compleja — formas, grandes áreas","2 o más folias / impresión sobre folia"]
  },
  {
    id:"material",tipo:"single",
    pregunta:"¿El material del sustrato es estándar o especial?",
    hint:"Ej: material compuesto como sustrato 1865",
    opts:["Material estándar","Material compuesto / especial"]
  },
  {
    id:"terminaciones",tipo:"multi",
    pregunta:"¿Qué terminaciones adicionales incluye?",
    hint:"Marca todas las que aplican",
    opts:[
      "Barniz pleno",
      "Barniz reservado",
      "Relieve o bajorrelieve",
      "Serigrafía",
      "Serigrafía con aromas",
      "Troquelado estándar",
      "Troquelado especial / ventanas",
      "Multicapa",
      "Ninguna"
    ]
  },
  {
    id:"acabados",tipo:"multi",
    pregunta:"¿Incluye alguno de estos acabados de alta gama?",
    hint:"Marca todos los que aplican",
    opts:[
      "Etiquetas numeradas",
      "Mosaico o Collage",
      "Tinta termocromática",
      "Doming",
      "Reinserción sobre folia CMYK (HP Índigo)",
      "Ninguno"
    ]
  },
];

// 4 niveles según documento
const RES={
  FACIL:{
    label:"FÁCIL",
    color:"#16a34a",light:"#1a3a2a",border:"#2a6a4a",icon:"✓",
    descripcion:"Impresión, barniz y troquelado estándar",
    accion:"Pasa directo a Gate 1 — Pre-Diseño",
    sla:"Lead time estándar"
  },
  MEDIA:{
    label:"MEDIA",
    color:"#d97706",light:"#3a2a0a",border:"#6a4a0a",icon:"◐",
    descripcion:"Pantones + cuatricromía, folia simple, barniz reservado",
    accion:"Gate 1 con flag técnico — validar Pantones y Folia",
    sla:"Lead time estándar + 2 días"
  },
  COMPLEJA:{
    label:"COMPLEJA",
    color:"#dc6803",light:"#3a2000",border:"#7a4000",icon:"▲",
    descripcion:"Material compuesto, folia compleja, relieve, serigrafía",
    accion:"Asignar operador senior — confirmar materiales antes de cotizar",
    sla:"Lead time estándar + 5 días"
  },
  MUY_COMPLEJA:{
    label:"MUY COMPLEJA",
    color:"#ef4444",light:"#3a1a1a",border:"#6a2a2a",icon:"!",
    descripcion:"Alta gama — múltiples técnicas especiales combinadas",
    accion:"Escalar a Jefe Técnico — no confirmar fecha al cliente",
    sla:"Pendiente evaluación técnica especializada"
  },
};

let step=0,resp={},multi=[],resultado=null,sesionNombre="";

// ── LOGIN ──────────────────────────────────────────
async function doLogin(){
  const u=document.getElementById("inputUsuario").value.trim();
  const c=document.getElementById("inputClave").value;
  if(!u||!c)return;
  const btn=document.getElementById("loginBtn");
  btn.disabled=true;btn.textContent="Verificando...";
  document.getElementById("loginMsg").innerHTML="";
  try{
    const r=await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({usuario:u,clave:c})});
    const d=await r.json();
    if(d.ok){
      sesionNombre=d.nombre;
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("appView").classList.remove("hidden");
      document.getElementById("nombreUsuario").textContent=d.nombre;
      render();
    }else{
      document.getElementById("loginMsg").innerHTML=`<div class="msg err">✗ Usuario o contraseña incorrectos</div>`;
      btn.disabled=false;btn.textContent="Ingresar →";
    }
  }catch(e){
    document.getElementById("loginMsg").innerHTML=`<div class="msg err">✗ Error de conexión</div>`;
    btn.disabled=false;btn.textContent="Ingresar →";
  }
}
function doLogout(){
  sesionNombre="";step=0;resp={};multi=[];resultado=null;
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
  document.getElementById("inputUsuario").value="";
  document.getElementById("inputClave").value="";
  document.getElementById("loginMsg").innerHTML="";
  document.getElementById("loginBtn").disabled=false;
  document.getElementById("loginBtn").textContent="Ingresar →";
}

// ── CLASIFICACIÓN 4 NIVELES ────────────────────────
function clasificar(){
  const pantones = resp.pantones||"";
  const folia    = resp.folia||"";
  const material = resp.material||"";
  const term     = resp.terminaciones||[];
  const acabados = resp.acabados||[];

  const tieneAcabadosAlta = acabados.some(x=>x!=="Ninguno");
  const tiene3Pantones    = pantones.includes("3 o más");
  const tiene2Folias      = folia.includes("2 o más");
  const foliaCompleja     = folia.includes("compleja");
  const materialEspecial  = material.includes("compuesto");
  const relieve           = term.includes("Relieve o bajorrelieve");
  const serigrafia        = term.includes("Serigrafía") || term.includes("Serigrafía con aromas");
  const troquelEsp        = term.includes("Troquelado especial / ventanas");
  const multicapa         = term.includes("Multicapa");
  const barnizRes         = term.includes("Barniz reservado");
  const foliaSimple       = folia.includes("simple");
  const tiene12Pantones   = pantones.includes("1-2");

  // MUY COMPLEJA: alta dificultad impresión + acabados alta gama
  if(tieneAcabadosAlta || tiene2Folias || (tiene3Pantones && (relieve||serigrafia||troquelEsp||multicapa))){
    return "MUY_COMPLEJA";
  }
  // COMPLEJA: material compuesto, folia compleja, relieve, serigrafía, troquelado especial, multicapa
  if(materialEspecial || foliaCompleja || relieve || serigrafia || troquelEsp || multicapa){
    return "COMPLEJA";
  }
  // MEDIA: 1-2 pantones, folia simple, barniz reservado
  if(tiene12Pantones || tiene3Pantones || foliaSimple || barnizRes){
    return "MEDIA";
  }
  // FÁCIL: solo CMYK, sin folia, sin terminaciones especiales
  return "FACIL";
}

// ── RENDER ────────────────────────────────────────
function render(){
  const card=document.getElementById("card");
  if(resultado){renderResult(card);return;}
  const s=STEPS[step],pct=((step)/STEPS.length)*100;
  let h=`<div class="prog">
    <div class="prog-top"><span class="prog-lbl">PASO ${step+1} / ${STEPS.length}</span><span class="prog-lbl">${Math.round(pct)}%</span></div>
    <div class="track"><div class="fill" style="width:${pct}%"></div></div>
  </div>
  <p class="question">${s.pregunta}</p>
  ${s.hint?`<p class="question-hint">${s.hint}</p>`:""}`;

  if(s.tipo==="text"){
    h+=`<input class="text-inp" id="ti" placeholder="${s.placeholder}" onkeydown="if(event.key==='Enter')subText()"/>
        <button class="primary-btn" onclick="subText()">Continuar →</button>`;
  }else if(s.tipo==="single"){
    h+=`<div class="opts">`+s.opts.map(o=>`<button class="opt-btn" onclick="selS('${o.replace(/'/g,"\\'")}')"><span class="dot-sq"></span>${o}</button>`).join("")+`</div>`;
  }else{
    h+=`<p class="multi-hint">Selección múltiple</p><div class="opts">`+
    s.opts.map(o=>{const id=o.replace(/[^a-zA-Z0-9]/g,'_');return`<button class="opt-btn" id="b_${id}" onclick="togM('${o.replace(/'/g,"\\'")}')"><span class="sq" id="s_${id}"></span>${o}</button>`;}).join("")+
    `</div><button class="primary-btn" style="margin-top:14px" onclick="confM()">Clasificar →</button>`;
  }
  card.innerHTML=h;
  if(s.tipo==="text")document.getElementById("ti").focus();
}

function subText(){const v=document.getElementById("ti").value.trim();if(!v)return;resp[STEPS[step].id]=v;next();}
function selS(v){resp[STEPS[step].id]=v;next();}
function togM(v){
  if(v==="Ninguna"||v==="Ninguno"){multi=[v];}
  else{multi=multi.filter(x=>x!=="Ninguna"&&x!=="Ninguno");multi.includes(v)?multi=multi.filter(x=>x!==v):multi.push(v);}
  STEPS[step].opts.forEach(o=>{
    const id=o.replace(/[^a-zA-Z0-9]/g,'_');
    const sq=document.getElementById("s_"+id),bn=document.getElementById("b_"+id);
    if(sq)sq.className=multi.includes(o)?"sq sel":"sq";
    if(bn)bn.className=multi.includes(o)?"opt-btn sel":"opt-btn";
  });
}
function confM(){
  resp[STEPS[step].id]=multi.length?[...multi]:["Ninguna"];
  multi=[];
  if(step<STEPS.length-1){setTimeout(()=>{step++;render();},150);}
  else{resultado=clasificar();render();}
}
function next(){
  if(step<STEPS.length-1){setTimeout(()=>{step++;render();},150);}
  else{resultado=clasificar();render();}
}

function renderResult(card){
  const r=RES[resultado];
  const inp=Object.entries(resp).filter(([k])=>k!=="cliente").map(([k,v])=>`<div class="inp-row"><span class="inp-k">${k}</span><span class="inp-v">${Array.isArray(v)?v.join(" / "):v}</span></div>`).join("");
  card.innerHTML=`
    <div class="badge" style="background:${r.light};border:1px solid ${r.border}">
      <span class="badge-icon" style="background:${r.color};width:32px;height:32px;border-radius:2px">${r.icon}</span>
      <div>
        <div class="badge-txt" style="color:${r.color}">COMPLEJIDAD: ${r.label}</div>
        <div class="badge-sub" style="color:${r.color}">${r.descripcion}</div>
      </div>
    </div>
    <div class="res-rows">
      <div class="res-row"><span class="res-key">Cliente</span><span class="res-val">${resp.cliente||"—"}</span></div>
      <div class="res-row"><span class="res-key">Acción</span><span class="res-val bold">${r.accion}</span></div>
      <div class="res-row"><span class="res-key">SLA</span><span class="res-val">${r.sla}</span></div>
    </div>
    <div class="inputs-box"><p class="inputs-lbl">Inputs registrados</p>${inp}</div>
    <div id="msgBox"></div>
    <div class="btns">
      <button class="save-btn" id="saveBtn" onclick="guardar()">↑ Guardar en Google Sheets</button>
      <button class="new-btn" onclick="reiniciar()">← Nueva evaluación</button>
    </div>`;
}

async function guardar(){
  const btn=document.getElementById("saveBtn");btn.disabled=true;btn.textContent="Guardando...";
  const r=RES[resultado];
  const payload={
    cliente:resp.cliente||"Sin nombre",
    complejidad:r.label,
    tecnologia:resp.tecnologia||"",
    pantones:resp.pantones||"",
    folia:resp.folia||"",
    material:resp.material||"",
    terminaciones:Array.isArray(resp.terminaciones)?resp.terminaciones.join(", "):resp.terminaciones||"",
    acabados:Array.isArray(resp.acabados)?resp.acabados.join(", "):resp.acabados||"",
    accion:r.accion,
    usuario:sesionNombre
  };
  try{
    await fetch(GS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    document.getElementById("msgBox").innerHTML=`<div class="msg ok">✓ Registro guardado en Google Sheets</div>`;
    btn.style.display="none";
  }catch(e){
    document.getElementById("msgBox").innerHTML=`<div class="msg err">✗ Error al guardar: ${e.message}</div>`;
    btn.disabled=false;btn.textContent="↑ Guardar en Google Sheets";
  }
}

function reiniciar(){step=0;resp={};multi=[];resultado=null;render();}
</script>
</body>
</html>
